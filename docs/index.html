<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS-600 Data Exporter</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4f8;
  color: #1a202c;
  min-height: 100vh;
}

.screen { display: none; }
.screen.active { display: block; }

/* ---- lang toggle ---- */
#lang-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  background: #fff;
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: .8rem;
  cursor: pointer;
  color: #4a5568;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
#lang-btn:hover { background: #edf2f7; }

/* ---- layout ---- */
.card {
  max-width: 640px;
  margin: 48px auto;
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}

h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }

.subtitle {
  color: #718096;
  font-size: .9rem;
  margin-bottom: 32px;
  line-height: 1.6;
}

.badge {
  display: inline-block;
  background: #ebf8ff;
  color: #2b6cb0;
  font-size: .75rem;
  padding: 3px 10px;
  border-radius: 99px;
  margin-bottom: 24px;
}

/* ---- buttons ---- */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: .9rem;
  font-weight: 500;
  transition: opacity .15s;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn:not(:disabled):hover { opacity: .85; }

.btn-primary {
  background: #3182ce;
  color: #fff;
  padding: 14px 32px;
  font-size: 1rem;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: opacity .15s, transform .1s;
}
.btn-primary:not(:disabled):hover { opacity: .9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

.btn-secondary { background: #edf2f7; color: #4a5568; }

/* ---- boxes ---- */
.error-box {
  background: #fff5f5;
  border: 1px solid #feb2b2;
  border-radius: 8px;
  padding: 14px 16px;
  color: #c53030;
  font-size: .875rem;
  line-height: 1.5;
  margin-top: 16px;
}

.info-box {
  background: #ebf8ff;
  border: 1px solid #90cdf4;
  border-radius: 8px;
  padding: 14px 16px;
  color: #2c5282;
  font-size: .875rem;
  line-height: 1.5;
  margin-top: 16px;
  margin-bottom: 20px;
}

/* ---- progress ---- */
.progress-wrap {
  background: #e2e8f0;
  border-radius: 99px;
  height: 10px;
  overflow: hidden;
  margin: 20px 0 12px;
}
.progress-bar {
  height: 100%;
  background: #3182ce;
  border-radius: 99px;
  transition: width .3s ease;
  width: 0%;
}
.progress-text { font-size: 1rem; color: #2d3748; font-weight: 500; }
.progress-detail { font-size: .8rem; color: #718096; margin-top: 6px; min-height: 1.2em; }

/* ---- period list ---- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.toolbar-summary { margin-left: auto; font-size: .85rem; color: #718096; }

.period-list {
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}

.period-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid #f0f4f8;
  cursor: pointer;
  transition: background .1s;
  gap: 14px;
}
.period-item:last-child { border-bottom: none; }
.period-item:hover { background: #f7fafc; }
.period-item.checked { background: #ebf8ff; }
.period-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #3182ce; flex-shrink: 0; }
.period-info { flex: 1; min-width: 0; }
.period-date { font-weight: 600; font-size: .95rem; }
.period-stats { font-size: .8rem; color: #718096; margin-top: 2px; }
.period-count { font-size: .8rem; color: #4a5568; text-align: right; white-space: nowrap; }

.export-bar { display: flex; justify-content: flex-end; gap: 12px; align-items: center; }
.export-info { font-size: .85rem; color: #718096; }

#screen-connect .btn-primary { display: block; width: 100%; margin-top: 24px; }

.done-icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }

@media (max-width: 680px) {
  .card { margin: 0; border-radius: 0; min-height: 100vh; padding: 28px 20px; }
}
</style>
</head>
<body>

<button id="lang-btn">日本語</button>

<!-- ===================== screen: unsupported ===================== -->
<div id="screen-unsupported" class="screen">
  <div class="card">
    <h1 data-i18n="title"></h1>
    <div class="error-box" style="margin-top:24px" data-i18n-html="unsupported_msg"></div>
  </div>
</div>

<!-- ===================== screen: connect ===================== -->
<div id="screen-connect" class="screen">
  <div class="card">
    <h1 data-i18n="title"></h1>
    <p class="subtitle" data-i18n="connect_subtitle"></p>
    <div class="info-box">
      <strong data-i18n="connect_info_title"></strong><br>
      <span data-i18n-html="connect_info_body"></span>
    </div>
    <div class="badge" data-i18n="connect_badge"></div>
    <button id="btn-connect" class="btn-primary" data-i18n="connect_btn"></button>
    <div id="connect-error" class="error-box" hidden></div>
  </div>
</div>

<!-- ===================== screen: progress ===================== -->
<div id="screen-progress" class="screen">
  <div class="card">
    <h1 data-i18n="progress_title"></h1>
    <p class="subtitle" data-i18n="progress_subtitle"></p>
    <div class="progress-wrap"><div id="progress-bar" class="progress-bar"></div></div>
    <p id="progress-text" class="progress-text"></p>
    <p id="progress-detail" class="progress-detail"></p>
  </div>
</div>

<!-- ===================== screen: select ===================== -->
<div id="screen-select" class="screen">
  <div class="card">
    <h1 data-i18n="select_title"></h1>
    <p class="subtitle" id="select-subtitle"></p>

    <div class="toolbar">
      <button id="btn-select-all" class="btn btn-secondary" data-i18n="select_all"></button>
      <button id="btn-deselect-all" class="btn btn-secondary" data-i18n="deselect_all"></button>
      <span id="toolbar-summary" class="toolbar-summary"></span>
    </div>

    <div id="period-list" class="period-list"></div>

    <div id="load-more-wrap" style="text-align:center;margin-bottom:20px" hidden>
      <button id="btn-load-more" class="btn btn-secondary" data-i18n="load_more_btn"></button>
      <p id="load-more-info" style="font-size:.8rem;color:#718096;margin-top:6px"></p>
    </div>

    <div style="margin-bottom:16px">
      <label style="font-size:.875rem;color:#4a5568;display:block;margin-bottom:6px"
             data-i18n="label_desc"></label>
      <input id="watch-label" type="text"
        style="width:100%;padding:10px 12px;border:1px solid #cbd5e0;border-radius:8px;font-size:.9rem;outline:none">
    </div>
    <div class="export-bar">
      <span id="export-info" class="export-info"></span>
      <button id="btn-export" class="btn-primary" data-i18n="export_btn"></button>
    </div>
  </div>
</div>

<!-- ===================== screen: done ===================== -->
<div id="screen-done" class="screen">
  <div class="card">
    <div class="done-icon">✓</div>
    <h1 style="text-align:center" data-i18n="done_title"></h1>
    <p class="subtitle" id="done-subtitle" style="text-align:center;margin-top:12px"></p>
    <button id="btn-restart" class="btn-primary"
            style="display:block;width:100%;margin-top:24px" data-i18n="restart_btn"></button>
  </div>
</div>

<script>

let lang = localStorage.getItem('ps600_lang') || 'en';

function t(key) { return STRINGS[lang][key] || STRINGS.en[key] || key; }

function applyLang() {

  document.title = t('title');
  document.getElementById('lang-btn').textContent = t('lang_btn');

// ================================================================
// BLE constants
// ================================================================
const SERVICE_UUID       = 'b5a60000-2ed3-e993-896b-cceb986f8d73';
const UUID_DL_SIZE       = 'b5a60020-2ed3-e993-896b-cceb986f8d73';
const UUID_DL_DATA       = 'b5a60022-2ed3-e993-896b-cceb986f8d73';
const UUID_DL_ORDER      = 'b5a60021-2ed3-e993-896b-cceb986f8d73';
const UUID_UL_DATA       = 'b5a60012-2ed3-e993-896b-cceb986f8d73';
const UUID_UL_ORDER      = 'b5a60011-2ed3-e993-896b-cceb986f8d73';
const UUID_UL_SIZE       = 'b5a60010-2ed3-e993-896b-cceb986f8d73';
const UUID_DATA_EVENT    = 'b5a60031-2ed3-e993-896b-cceb986f8d73';
const UUID_CONTROL_POINT = 'b5a60030-2ed3-e993-896b-cceb986f8d73';

const CMD_CONNECT    = 0x00;
const CMD_GET_DATA   = 0x20;
const ELEM_BODY      = 0x00;
const ELEM_IDX_TABLE = 0x02;
const ELEM_BODY_SIZE = 0x41;
const FILTER_NONE    = 0x00;
const CLASS_LOG      = 0x5100;
const CLASS_SUMMARY  = 0x5110;
const IS_FIRST       = 0x80;
const IS_LAST        = 0x40;
const ACK_OK         = 0xAA;
const BLOCK_SIZE     = 32;
const CP_UNLOCK_MUTEX = 0x20;

// ================================================================
// Utilities
// ================================================================
const delay = ms => new Promise(r => setTimeout(r, ms));

function concat(...arrays) {
  const total = arrays.reduce((s, a) => s + a.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const a of arrays) { out.set(a, off); off += a.length; }
  return out;
}

function writeLE32(val) {
  const b = new Uint8Array(4);
  new DataView(b.buffer).setUint32(0, val, true);
  return b;
}

function writeLE16(val) {
  const b = new Uint8Array(2);
  new DataView(b.buffer).setUint16(0, val, true);
  return b;
}

// ================================================================
// AsyncQueue
// ================================================================
class AsyncQueue {
  constructor() { this._q = []; this._w = []; }

  put(item) {
    if (this._w.length) this._w.shift()(item);
    else this._q.push(item);
  }

  get(timeoutMs = 30000) {
    return new Promise((resolve, reject) => {
      if (this._q.length) { resolve(this._q.shift()); return; }
      let done = false;
      const timer = setTimeout(() => {
        if (done) return;
        done = true;
        const i = this._w.findIndex(w => w === waiter);
        if (i >= 0) this._w.splice(i, 1);
        reject(new Error('timeout'));
      }, timeoutMs);
      const waiter = item => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        resolve(item);
      };
      this._w.push(waiter);
    });
  }

  clear() { this._q = []; }
}

// ================================================================
// AsyncEvent
// ================================================================
class AsyncEvent {
  constructor() { this._set = false; this._val = null; this._w = []; }

  set(val) {
    this._set = true; this._val = val;
    this._w.forEach(fn => fn(val));
    this._w = [];
  }

  clear() { this._set = false; this._val = null; }

  wait(timeoutMs = 30000) {
    if (this._set) return Promise.resolve(this._val);
    return new Promise((resolve, reject) => {
      let done = false;
      const timer = setTimeout(() => {
        if (done) return;
        done = true;
        reject(new Error('DL_ACK timeout'));
      }, timeoutMs);
      this._w.push(val => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        resolve(val);
      });
    });
  }
}

// ================================================================
// Command builders
// ================================================================
function cmdConnect() {
  return concat(new Uint8Array([CMD_CONNECT]), writeLE32(0));
}

function cmdGetIndexTable(classId, filterVal = FILTER_NONE) {
  const payload = concat(writeLE16(classId), new Uint8Array([ELEM_IDX_TABLE, filterVal]));
  return concat(new Uint8Array([CMD_GET_DATA]), writeLE32(payload.length), payload);
}

function cmdGetSize(classId, index) {
  const payload = concat(writeLE16(classId), new Uint8Array([ELEM_BODY_SIZE]), writeLE16(index));
  return concat(new Uint8Array([CMD_GET_DATA]), writeLE32(payload.length), payload);
}

function cmdGetBody(classId, index, offset, size) {
  const payload = concat(
    writeLE16(classId), new Uint8Array([ELEM_BODY]),
    writeLE16(index), writeLE32(offset), writeLE32(size)
  );
  return concat(new Uint8Array([CMD_GET_DATA]), writeLE32(payload.length), payload);
}

// ================================================================
// Packet framing
// ================================================================
function makePacket(seq, payload, isFirst, isLast) {
  const len = payload.length;
  const b0 = (isFirst ? IS_FIRST : 0) | (isLast ? IS_LAST : 0)
           | ((seq & 0x1F) << 1) | ((len >> 8) & 0x01);
  const pkt = new Uint8Array(20).fill(0xAA);
  pkt[0] = b0; pkt[1] = len & 0xFF;
  pkt.set(payload, 2);
  return pkt;
}

function divideCommand(data) {
  const pkts = [];
  let seq = 0, off = 0;
  while (off < data.length) {
    const end = Math.min(off + 18, data.length);
    pkts.push(makePacket(seq % BLOCK_SIZE, data.slice(off, end), off === 0, end >= data.length));
    seq++; off = end;
  }
  return pkts;
}

// ================================================================
// Response parsers
// ================================================================
function parseIndexTable(data) {
  if (data.length < 14) return null;
  const v = new DataView(data.buffer, data.byteOffset);
  if (v.getUint8(5) !== 0) return null;
  const tableSize = v.getUint32(10, true);
  const indices = [];
  for (let i = 14; i + 1 < data.length && i < 14 + tableSize; i += 2)
    indices.push(v.getUint16(i, true));
  return indices;
}

function parseDataSize(data) {
  if (data.length < 15 || data[5] !== 0) return null;
  return new DataView(data.buffer, data.byteOffset).getUint32(11, true);
}

function parseBody(data) {
  if (data.length < 19 || data[5] !== 0) return null;
  return data.slice(19);
}

function parseSummaryTimestamp(bodyPayload) {
  const off = 20;
  if (bodyPayload.length < off + 8) return null;
  const v = new DataView(bodyPayload.buffer, bodyPayload.byteOffset);
  const year = v.getUint16(off, true);
  const month = bodyPayload[off + 2], day   = bodyPayload[off + 3];
  const hour  = bodyPayload[off + 4], min   = bodyPayload[off + 5];
  const sec   = bodyPayload[off + 6], tzQ   = bodyPayload[off + 7];
  const tzOffsetMin = tzQ * 15;
  // Summary stores UTC time; tzQ indicates the local timezone for display only
  return { utc: new Date(Date.UTC(year, month - 1, day, hour, min, sec)), tzOffsetMin };
}

// ================================================================
// PS600Protocol
// ================================================================
class PS600Protocol {
  constructor(chars) {
    this._chars = chars;
    this._dlAck = new AsyncEvent();
    this._ulQueue = new AsyncQueue();

    chars.dlOrder.addEventListener('characteristicvaluechanged', e => {
      this._dlAck.set(new Uint8Array(e.target.value.buffer)[0]);
    });
    chars.ulData.addEventListener('characteristicvaluechanged', e => {
      const data = new Uint8Array(e.target.value.buffer);
      if (data.length >= 2) this._ulQueue.put(data);
    });
  }

  async _ulAck() {
    await this._chars.ulOrder.writeValue(new Uint8Array([ACK_OK]));
  }

  async _receiveResponse(deadlineMs) {
    const result = [];
    while (true) {
      const remaining = deadlineMs - Date.now();
      let pkt;
      try {
        pkt = await this._ulQueue.get(Math.max(remaining, 1000));
      } catch {
        throw new Error('Response timeout');
      }
      const seq    = (pkt[0] & 0x3E) >> 1;
      const isLast = !!(pkt[0] & IS_LAST);
      const length = ((pkt[0] & 0x01) << 8) | pkt[1];
      result.push(...pkt.slice(2, 2 + length));

      // Skip block ACK when IS_LAST is also set —
      // sending two ACKs causes the device to disconnect on the first one.
      if (seq === 31 && !isLast) await this._ulAck();
      if (isLast) {
        await this._ulAck();
        await delay(100);
        return new Uint8Array(result);
      }
    }
  }

  async send(command, timeoutMs = 30000) {
    const packets = divideCommand(command);
    this._ulQueue.clear();
    this._dlAck.clear();

    await this._chars.dlSize.writeValue(writeLE32(command.length));

    const deadlineMs = Date.now() + timeoutMs;
    for (let b = 0; b < packets.length; b += BLOCK_SIZE) {
      const block = packets.slice(b, b + BLOCK_SIZE);
      this._dlAck.clear();
      for (const pkt of block) {
        await this._chars.dlData.writeValueWithoutResponse(pkt);
        await delay(10);
      }
      try {
        await this._dlAck.wait(Math.max(deadlineMs - Date.now(), 1000));
      } catch {
        throw new Error('TX ACK timeout');
      }
    }
    return this._receiveResponse(deadlineMs);
  }
}

// ================================================================
// Session state (persists across "Load more" clicks)
// ================================================================
let gProto = null;
let gServer = null;
let gChars = null;
let gLogIndices = [];
let gSumIndicesSet = new Set();
let gScanCursor = 0;           // how many indices from the END have been scanned
let gSummaryCache = new Map(); // idx -> { utc, tzOffsetMin } | null

function gSessionReset() {
  gProto = null; gServer = null; gChars = null;
  gLogIndices = []; gSumIndicesSet = new Set();
  gScanCursor = 0; gSummaryCache = new Map();
}

async function fetchAndCacheSummary(idx) {
  if (gSummaryCache.has(idx)) return;
  if (!gSumIndicesSet.has(idx)) { gSummaryCache.set(idx, null); return; }
  try {
    const sSize = parseDataSize(await gProto.send(cmdGetSize(CLASS_SUMMARY, idx)));
    if (!sSize) { gSummaryCache.set(idx, null); return; }
    const sPay = parseBody(await gProto.send(cmdGetBody(CLASS_SUMMARY, idx, 0, sSize)));
    gSummaryCache.set(idx, sPay ? parseSummaryTimestamp(sPay) : null);
  } catch {
    gSummaryCache.set(idx, null);
  }
}

// Scan backwards from the current cursor to find the next date group.
// Returns { date, indices } or null if no more data.
async function scanNextDateGroup(onProgress) {
  const N = gLogIndices.length;
  let currentDate = null;
  const groupIndices = [];

  while (gScanCursor < N) {
    const i = N - 1 - gScanCursor;
    const idx = gLogIndices[i];
    onProgress({ phase: 'scanning', scanned: gScanCursor, total: N });

    await fetchAndCacheSummary(idx);
    const cached = gSummaryCache.get(idx);

    let dateStr = null;
    if (cached) {
      const tzOff = cached.tzOffsetMin ?? BROWSER_TZ_OFFSET_MIN;
      dateStr = toLocalStr(cached.utc, tzOff).slice(0, 10);
    }

    if (currentDate === null) {
      currentDate = dateStr ?? '__nodate__';
    } else if (dateStr !== null && dateStr !== currentDate) {
      // Date changed — stop before consuming this index
      break;
    }
    // Same date, or no Summary → include in this group
    groupIndices.push(idx);
    gScanCursor++;
  }

  if (groupIndices.length === 0) return null;
  return { date: currentDate, indices: groupIndices.reverse() };
}

// Download body data for a set of indices. Returns array of records.
async function loadGroupBodies(indices, onProgress) {
  const records = [];
  for (let j = 0; j < indices.length; j++) {
    const idx = indices[j];
    onProgress({ phase: 'loading', done: j, total: indices.length, index: idx });
    try {
      const dataSize = parseDataSize(await gProto.send(cmdGetSize(CLASS_LOG, idx)));
      if (!dataSize) continue;
      const payload = parseBody(await gProto.send(cmdGetBody(CLASS_LOG, idx, 0, dataSize)));
      if (!payload) continue;

      const cached = gSummaryCache.get(idx);
      const startDate = cached?.utc || null;
      const tzOffsetMin = cached?.tzOffsetMin ?? null;

      const samples = [];
      for (let s = 0; s < Math.floor(payload.length / 4); s++) {
        const hr = payload[s * 4];
        if (hr !== 0 && hr !== 0xFF)
          samples.push({ sampleNum: s, hr, flags1: payload[s*4+1], flags3: payload[s*4+3] });
      }
      if (samples.length > 0)
        records.push({ index: idx, startDate, tzOffsetMin, samples });
    } catch {}
  }
  return records;
}

// ================================================================
// Browser timezone fallback
// ================================================================
const BROWSER_TZ_OFFSET_MIN = -new Date().getTimezoneOffset();

function effectiveTzOffset(rec) {
  return (rec.tzOffsetMin !== null && rec.tzOffsetMin !== undefined)
    ? rec.tzOffsetMin
    : BROWSER_TZ_OFFSET_MIN;
}

function toLocalStr(utcDate, tzOffsetMin) {
  return new Date(utcDate.getTime() + tzOffsetMin * 60 * 1000)
    .toISOString().replace('T', ' ').slice(0, 19);
}

// ================================================================
// Group records by date
// ================================================================
function groupByDate(records) {
  const groups = new Map();
  for (const rec of records) {
    let dateStr = t('period_unknown');
    let timeStr = '';
    if (rec.startDate) {
      const tz = effectiveTzOffset(rec);
      const iso = toLocalStr(rec.startDate, tz);
      dateStr = iso.slice(0, 10);
      timeStr = iso.slice(11, 16);
    }
    if (!groups.has(dateStr)) groups.set(dateStr, []);
    groups.get(dateStr).push({ rec, timeStr });
  }
  return groups;
}

// ================================================================
// CSV generation
// ================================================================
function generateCSV(records) {
  const rows = [['datetime_local', 'utc_offset_min', 'unix_timestamp', 'record_index', 'sample_num', 'heart_rate_bpm']];
  for (const rec of records) {
    const tzOffsetMin = effectiveTzOffset(rec);
    for (const s of rec.samples) {
      let dtStr = '', ts = '';
      if (rec.startDate) {
        const sDate = new Date(rec.startDate.getTime() + s.sampleNum * 60000);
        dtStr = toLocalStr(sDate, tzOffsetMin);
        ts = Math.floor(sDate.getTime() / 1000);
      }
      rows.push([dtStr, tzOffsetMin, ts, rec.index, s.sampleNum, s.hr]);
    }
  }
  return '﻿' + rows.map(r => r.join(',')).join('\r\n');
}

function downloadFile(content, filename) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ================================================================
// UI helpers
// ================================================================
let allRecords = [];
let checkStates = new Map();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateProgress(info) {
  const bar  = document.getElementById('progress-bar');
  const text = document.getElementById('progress-text');
  const det  = document.getElementById('progress-detail');

  if (info.phase === 'connect') {
    text.textContent = t('connecting'); bar.style.width = '5%'; det.textContent = '';
  } else if (info.phase === 'index') {
    text.textContent = t('progress_index'); bar.style.width = '10%'; det.textContent = '';
  } else if (info.phase === 'scanning') {
    const pct = info.total > 0 ? Math.round((info.scanned / info.total) * 40 + 10) : 10;
    bar.style.width = pct + '%';
    text.textContent = t('progress_scanning');
    det.textContent = lang === 'ja'
      ? `${info.scanned} / ${info.total} 件確認済み`
      : `${info.scanned} / ${info.total} checked`;
  } else if (info.phase === 'loading') {
    const pct = info.total > 0 ? Math.round((info.done / info.total) * 55 + 40) : 40;
    bar.style.width = pct + '%';
    text.textContent = t('progress_loading');
    det.textContent = info.index !== undefined ? `index=${info.index}` : '';
  } else if (info.phase === 'done') {
    bar.style.width = '100%';
    text.textContent = lang === 'ja'
      ? `取得完了: ${info.total} セッション`
      : `Done: ${info.total} sessions`;
    det.textContent = '';
  }
}

function buildPeriodList(records) {
  const list = document.getElementById('period-list');
  list.innerHTML = '';

  const groups = groupByDate(records);

  // Newest date first
  for (const [dateStr, items] of [...groups.entries()].sort(([a],[b]) => a > b ? -1 : 1)) {
    for (const { rec, timeStr } of items) {
      if (!checkStates.has(rec.index)) checkStates.set(rec.index, true);
      const checked = checkStates.get(rec.index);
      const hrs = rec.samples.map(s => s.hr);
      const avg = Math.round(hrs.reduce((a, b) => a + b, 0) / hrs.length);
      const min = Math.min(...hrs), max = Math.max(...hrs);
      const label = timeStr ? `${dateStr} ${timeStr}–` : dateStr;
      const lastSample = rec.samples[rec.samples.length - 1]?.sampleNum + 1 || 0;
      const duration = lang === 'ja' ? `約 ${lastSample} 分` : `~${lastSample} min`;
      const stats    = lang === 'ja'
        ? `平均 ${avg} / 最低 ${min} / 最高 ${max} BPM ・ ${duration}`
        : `Avg ${avg} / Min ${min} / Max ${max} BPM · ${duration}`;
      const countLabel = lang === 'ja' ? `${hrs.length} 件` : `${hrs.length} samples`;

      const div = document.createElement('div');
      div.className = 'period-item' + (checked ? ' checked' : '');
      div.dataset.index = rec.index;
      div.innerHTML = `
        <input type="checkbox" ${checked ? 'checked' : ''} data-idx="${rec.index}">
        <div class="period-info">
          <div class="period-date">${label}</div>
          <div class="period-stats">${stats}</div>
        </div>
        <div class="period-count">${countLabel}</div>
      `;

      const cb = div.querySelector('input');
      div.addEventListener('click', e => {
        if (e.target !== cb) cb.checked = !cb.checked;
        checkStates.set(rec.index, cb.checked);
        div.classList.toggle('checked', cb.checked);
        updateToolbarSummary();
      });

      list.appendChild(div);
    }
  }
  updateToolbarSummary();
}

function updateToolbarSummary() {
  const checked = [...checkStates.values()].filter(Boolean).length;
  const total = checkStates.size;
  document.getElementById('toolbar-summary').textContent = lang === 'ja'
    ? `${checked} / ${total} セッション選択中`
    : `${checked} / ${total} sessions selected`;
  const selectedRecords = allRecords.filter(r => checkStates.get(r.index));
  const totalSamples = selectedRecords.reduce((s, r) => s + r.samples.length, 0);
  document.getElementById('export-info').textContent = lang === 'ja'
    ? `合計 ${totalSamples.toLocaleString()} 件`
    : `Total ${totalSamples.toLocaleString()} samples`;
}

function updateSelectSubtitle() {
  const totalSamples = allRecords.reduce((s, r) => s + r.samples.length, 0);
  const remaining = gLogIndices.length - gScanCursor;
  let text = lang === 'ja'
    ? `${allRecords.length} セッション / ${totalSamples.toLocaleString()} サンプルを読み込みました。`
    : `Loaded ${allRecords.length} sessions / ${totalSamples.toLocaleString()} samples.`;
  if (remaining > 0) {
    text += lang === 'ja'
      ? `（全 ${gLogIndices.length} 件中、最新データを表示）`
      : ` (Showing latest of ${gLogIndices.length} total records)`;
  }
  document.getElementById('select-subtitle').textContent = text;
}

function updateLoadMoreUI() {
  const remaining = gLogIndices.length - gScanCursor;
  const wrap = document.getElementById('load-more-wrap');
  const btn  = document.getElementById('btn-load-more');
  const info = document.getElementById('load-more-info');

  if (remaining === 0) { wrap.hidden = true; return; }

  wrap.hidden = false;
  btn.textContent = t('load_more_btn');
  const connected = gServer?.connected;
  btn.disabled = !connected;
  info.textContent = connected
    ? (lang === 'ja'
        ? `未読み込み: あと約 ${remaining} 件のレコードがあります`
        : `${remaining} older records not yet loaded`)
    : (lang === 'ja'
        ? '時計が切断されました。再接続すると続きを読み込めます。'
        : 'Watch disconnected. Reconnect to load more.');
}

function disconnectSession() {
  if (gChars?.ctrlPt) {
    try { gChars.ctrlPt.writeValue(new Uint8Array([CP_UNLOCK_MUTEX])); } catch {}
  }
  if (gServer?.connected) {
    try { gServer.disconnect(); } catch {}
  }
}

// ================================================================
// Connect flow
// ================================================================
document.getElementById('btn-connect').addEventListener('click', async () => {
  const btn = document.getElementById('btn-connect');
  const errBox = document.getElementById('connect-error');
  errBox.hidden = true;
  btn.disabled = true;
  btn.textContent = t('connecting');

  let device;
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });
  } catch (e) {
    btn.disabled = false;
    btn.textContent = t('connect_btn');
    if (e.name !== 'NotFoundError' && e.name !== 'AbortError') {
      errBox.textContent = `Error: ${e.message}`;
      errBox.hidden = false;
    }
    return;
  }

  showScreen('screen-progress');
  gSessionReset();
  allRecords = [];
  checkStates = new Map();

  try {
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    const chars = {
      dlSize:  await service.getCharacteristic(UUID_DL_SIZE),
      dlData:  await service.getCharacteristic(UUID_DL_DATA),
      dlOrder: await service.getCharacteristic(UUID_DL_ORDER),
      ulData:  await service.getCharacteristic(UUID_UL_DATA),
      ulOrder: await service.getCharacteristic(UUID_UL_ORDER),
      ulSize:  await service.getCharacteristic(UUID_UL_SIZE),
      ctrlPt:  await service.getCharacteristic(UUID_CONTROL_POINT),
      dataEvt: await service.getCharacteristic(UUID_DATA_EVENT),
    };

    await chars.dlOrder.startNotifications();
    await chars.ulData.startNotifications();
    await chars.ulSize.startNotifications();
    await chars.dataEvt.startNotifications();

    const proto = new PS600Protocol(chars);

    // Initialize: connect command + fetch index tables
    updateProgress({ phase: 'connect' });
    await proto.send(cmdConnect());

    updateProgress({ phase: 'index' });
    gLogIndices = parseIndexTable(await proto.send(cmdGetIndexTable(CLASS_LOG))) || [];
    gSumIndicesSet = new Set(parseIndexTable(await proto.send(cmdGetIndexTable(CLASS_SUMMARY))) || []);

    if (gLogIndices.length === 0) {
      throw new Error(lang === 'ja'
        ? 'データが見つかりませんでした。'
        : 'No data found on the watch.');
    }

    // Store session (keep connection alive for Load more)
    gProto = proto;
    gServer = server;
    gChars = chars;

    // Scan latest date group and download its body data
    const group = await scanNextDateGroup(updateProgress);
    if (!group) throw new Error('No records found.');

    const records = await loadGroupBodies(group.indices, updateProgress);
    if (records.length === 0) {
      throw new Error(lang === 'ja'
        ? 'データが取得できませんでした。時計を近づけて再試行してください。'
        : 'No data retrieved. Move the watch closer and try again.');
    }

    allRecords = records;
    for (const r of records) checkStates.set(r.index, true);

    // Update UI when watch disconnects unexpectedly
    device.addEventListener('gattserverdisconnected', () => {
      if (document.getElementById('screen-select').classList.contains('active')) {
        updateLoadMoreUI();
      }
    });

  } catch (e) {
    console.error(e);
    disconnectSession();
    gSessionReset();
    showScreen('screen-connect');
    errBox.textContent = `Error: ${e.message}`;
    errBox.hidden = false;
    btn.disabled = false;
    btn.textContent = t('connect_btn');
    return;
  }

  updateSelectSubtitle();
  buildPeriodList(allRecords);
  updateLoadMoreUI();
  showScreen('screen-select');
});

// ================================================================
// Load more
// ================================================================
document.getElementById('btn-load-more').addEventListener('click', async () => {
  if (!gServer?.connected) { updateLoadMoreUI(); return; }

  showScreen('screen-progress');
  updateProgress({ phase: 'scanning', scanned: gScanCursor, total: gLogIndices.length });

  try {
    const group = await scanNextDateGroup(updateProgress);
    if (group) {
      const newRecords = await loadGroupBodies(group.indices, updateProgress);
      for (const r of newRecords) {
        allRecords.push(r);
        checkStates.set(r.index, true);
      }
    }
  } catch (e) {
    console.error(e);
  }

  updateSelectSubtitle();
  buildPeriodList(allRecords);
  updateLoadMoreUI();
  showScreen('screen-select');
});

// ================================================================
// Select screen controls
// ================================================================
document.getElementById('btn-select-all').addEventListener('click', () => {
  document.querySelectorAll('#period-list input[type=checkbox]').forEach(cb => {
    cb.checked = true;
    checkStates.set(parseInt(cb.dataset.idx), true);
    cb.closest('.period-item').classList.add('checked');
  });
  updateToolbarSummary();
});

document.getElementById('btn-deselect-all').addEventListener('click', () => {
  document.querySelectorAll('#period-list input[type=checkbox]').forEach(cb => {
    cb.checked = false;
    checkStates.set(parseInt(cb.dataset.idx), false);
    cb.closest('.period-item').classList.remove('checked');
  });
  updateToolbarSummary();
});

document.getElementById('btn-export').addEventListener('click', () => {
  const selected = allRecords.filter(r => checkStates.get(r.index));
  if (selected.length === 0) {
    alert(lang === 'ja'
      ? 'エクスポートするセッションを選択してください。'
      : 'Please select at least one session.');
    return;
  }
  const csv = generateCSV(selected);
  const dateStr = new Date().toISOString().slice(0, 10);
  const label = document.getElementById('watch-label').value.trim()
    .replace(/[\\/:*?"<>|]/g, '_');
  downloadFile(csv, label ? `ps600_${label}_${dateStr}.csv` : `ps600_${dateStr}.csv`);

  disconnectSession();
  gSessionReset();

  const totalSamples = selected.reduce((s, r) => s + r.samples.length, 0);
  document.getElementById('done-subtitle').textContent = lang === 'ja'
    ? `${selected.length} セッション・${totalSamples.toLocaleString()} サンプルを保存しました。`
    : `${selected.length} sessions · ${totalSamples.toLocaleString()} samples saved.`;
  showScreen('screen-done');
});

document.getElementById('btn-restart').addEventListener('click', () => {
  disconnectSession();
  gSessionReset();
  allRecords = [];
  checkStates = new Map();
  const btn = document.getElementById('btn-connect');
  btn.disabled = false;
  btn.textContent = t('connect_btn');
  document.getElementById('connect-error').hidden = true;
  showScreen('screen-connect');
});

// ================================================================
// Init
// ================================================================
if (!navigator.bluetooth) {
  showScreen('screen-unsupported');
} else {
  showScreen('screen-connect');
}
applyLang();
</script>
</body>
